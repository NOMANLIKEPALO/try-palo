<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Facebook - Home</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== TOPBAR ===== -->
<header class="topbar">
  <h1 class="logo-small">facebook</h1>
  <input type="text" class="searchbar" placeholder="Search Facebook">
  <button class="logout" onclick="logout()">Log out</button>
</header>

<div class="home-container">

  <!-- ===== LEFT SIDEBAR ===== -->
  <div class="sidebar left-sidebar">
    <h3>Menu</h3>
    <ul>
      <li>Profile</li>
      <li>Friends</li>
      <li>Messages</li>
      <li>Notifications</li>
      <li>Settings</li>
    </ul>
  </div>

  <!-- ===== FEED ===== -->
  <div class="feed">

    <!-- Post with image -->
    <div class="post-box">
      <textarea placeholder="What's on your mind?"></textarea>
      <button>Post</button>
    </div>

    <div class="post">
      <div class="post-header">
        <img src="https://randomuser.me/api/portraits/men/32.jpg" alt="profile" class="profile-pic">
        <h4>Palo Pool</h4>
      </div>
      <p>This is a sample post with an image.</p>
      <img src="https://source.unsplash.com/600x300/?nature,water" alt="post-image" class="post-image">
    </div>

    <div class="post">
      <div class="post-header">
        <img src="https://randomuser.me/api/portraits/women/44.jpg" alt="profile" class="profile-pic">
        <h4>Jane Doe</h4>
      </div>
      <p>Check out this amazing view!</p>
      <img src="https://source.unsplash.com/600x300/?mountains,sky" alt="post-image" class="post-image">
    </div>

    <div class="post">
      <div class="post-header">
        <img src="https://randomuser.me/api/portraits/men/50.jpg" alt="profile" class="profile-pic">
        <h4>Mike</h4>
      </div>
      <p>Just enjoying a chill day.</p>
      <img src="https://source.unsplash.com/600x300/?beach,sunset" alt="post-image" class="post-image">
    </div>

  </div>

  <!-- ===== RIGHT SIDEBAR ===== -->
  <div class="sidebar right-sidebar">
    <h3>Suggestions</h3>
    <ul>
      <li>Friend Suggestion 1</li>
      <li>Friend Suggestion 2</li>
      <li>Friend Suggestion 3</li>
    </ul>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
