<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Facebook - Home</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <h1 class="logo-small">facebook</h1>
  <button class="logout" onclick="logout()">Log out</button>
</header>

<div class="home-container">

  <div class="sidebar">
    <h3>Menu</h3>
    <ul>
      <li>Profile</li>
      <li>Friends</li>
      <li>Messages</li>
      <li>Notifications</li>
      <li>Settings</li>
    </ul>
  </div>

  <div class="feed">

    <div class="post-box">
      <textarea placeholder="What's on your mind?"></textarea>
      <button>Post</button>
    </div>

    <div class="post">
      <h4>User Name</h4>
      <p>This is a sample Facebook post.</p>
    </div>

    <div class="post">
      <h4>Another User</h4>
      <p>This is another example post on the homepage.</p>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
