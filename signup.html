

<!DOCTYPE html>
<html>
<head>
<title>Facebook Sign Up</title>
<link rel="stylesheet" href="signup.css">
</head>

<body>

<div class="container">

<div class="box">
<h1 class="logo">facebook</h1>
<h2>Create a new account</h2>
<p>It's quick and easy.</p>

<form>
<div class="name">
<input type="text" placeholder="First name">
<input type="text" placeholder="Surname">
</div>

<input type="text" placeholder="Mobile number or email address">
<input type="password" placeholder="New password">

<label>Date of birth</label>
<div class="dob">
<select>
<option>Day</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
</select>

<select>
<option>Month</option>
<option>Jan</option>
<option>Feb</option>
<option>Mar</option>
</select>

<select>
<option>Year</option>
<option>2003</option>
<option>2002</option>
<option>2001</option>
</select>
</div>

<label>Gender</label>
<div class="gender">
<label><input type="radio" name="g"> Female</label>
<label><input type="radio" name="g"> Male</label>
<label><input type="radio" name="g"> Custom</label>
</div>

<button class="signup">Sign Up</button>
</form>

</div>

</div>

</body>
</html>
