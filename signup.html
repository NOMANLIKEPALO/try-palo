<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Facebook - Sign Up</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="signup-container">

  <div class="signup-box">

    <h1 class="logo-center">facebook</h1>

    <h2>Create a new account</h2>
    <p class="sub">It's quick and easy.</p>

    <form id="signupForm">

      <div class="row">
        <input type="text" placeholder="First name" required>
        <input type="text" placeholder="Surname" required>
      </div>

      <input type="text" id="signupEmail" placeholder="Mobile number or email address" required>
<input type="password" id="signupPassword" placeholder="New password" required>
      <label>Date of birth</label>
      <input type="date" required>

      <label>Gender</label>
      <div class="gender">
        <label><input type="radio" name="gender"> Male</label>
        <label><input type="radio" name="gender"> Female</label>
        <label><input type="radio" name="gender"> Gayyy</label>
      </div>

      <button type="submit" class="signup-btn">Sign Up</button>

      <p class="login-link">Already have an account? <a href="index.html">Log in</a></p>

    </form>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
